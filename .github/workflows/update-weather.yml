name: Update Weather Data

on:
  schedule:
    - cron: "5 */2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Frost data script
        env:
          FROST_CLIENT_ID: ${{ secrets.FROST_CLIENT_ID }}
        run: python norges-verste-vaer/scripts/fetch_frost_data.py

      - name: Commit updated data
        run: |
          git config --global user.name "weather-bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Auto update weather data" || echo "No changes"
          git push
